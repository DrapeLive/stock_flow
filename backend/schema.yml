components:
  schemas:
    AddOrderItemRequest:
      type: object
      properties:
        qr_code:
          type: string
          format: uuid
        quantity:
          type: integer
        variant:
          type: integer
        size:
          type: integer
      required:
      - qr_code
      - quantity
      - size
      - variant
    Admin:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
      required:
      - email
      - id
      - username
    AdminRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        password:
          type: string
          writeOnly: true
          minLength: 1
          maxLength: 128
      required:
      - email
      - password
      - username
    Agent:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/AgentUser'
          readOnly: true
        contact:
          type: string
          maxLength: 20
        total_customers:
          type: string
          readOnly: true
      required:
      - contact
      - id
      - total_customers
      - user
    AgentRequest:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
          minLength: 1
        email:
          type: string
          format: email
          writeOnly: true
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
        contact:
          type: string
          minLength: 1
          maxLength: 20
      required:
      - contact
      - email
      - password
      - username
    AgentUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          maxLength: 254
        role:
          oneOf:
          - $ref: '#/components/schemas/RoleEnum'
          - $ref: '#/components/schemas/BlankEnum'
      required:
      - email
      - id
      - username
